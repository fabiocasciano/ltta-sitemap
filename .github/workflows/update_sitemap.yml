name: Update Sitemap HTML

on:
  schedule:
    - cron: '0 0 * * *' # Viene eseguito ogni giorno a mezzanotte
  workflow_dispatch: # Ti permette di avviarlo manualmente dalla scheda Actions

permissions:
  contents: write # Fondamentale per permettere al bot di salvare il file HTML

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run converter
        run: python converter.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap-embed.html
          # Il comando || true evita che l'azione fallisca se non ci sono cambiamenti
          git commit -m "Update sitemap HTML via Scraper" || true
          git push origin main
